name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (${{ matrix.os }} / bash ${{ matrix.bash }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bash: system   # bash 5.x on Ubuntu
          - os: macos-latest
            bash: system   # bash 3.2 on macOS (Apple ships ancient bash)
          - os: macos-latest
            bash: homebrew # bash 5.x via homebrew

    steps:
      - uses: actions/checkout@v4

      - name: Install jq (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y jq shellcheck

      - name: Install jq + shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install jq shellcheck

      - name: Install homebrew bash (macOS homebrew matrix)
        if: matrix.bash == 'homebrew'
        run: brew install bash

      - name: Show environment
        run: |
          echo "bash: $(bash --version | head -1)"
          echo "jq:   $(jq --version)"
          echo "os:   ${{ matrix.os }}"

      - name: Check dependencies
        run: bash scripts/check-deps.sh

      - name: Run test suite
        run: bash tests/test-detection.sh

      - name: Check count consistency
        run: bash scripts/check-counts.sh

      - name: Run shellcheck
        run: |
          shellcheck -x scripts/examine.sh
          shellcheck -x scripts/diagnose.sh
          shellcheck -x scripts/cost-waterfall.sh
          shellcheck -x scripts/headline.sh
          shellcheck -x scripts/prescribe.sh
          shellcheck -x scripts/history.sh
          shellcheck -x scripts/health-check.sh
          shellcheck -x scripts/check-deps.sh
          shellcheck -x scripts/check-counts.sh
          shellcheck -x scripts/generate-demo.sh
          shellcheck -x tests/test-detection.sh

  validate-skill:
    name: Validate SKILL.md frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md YAML frontmatter
        run: |
          python3 -c "
          import re, sys
          content = open('SKILL.md').read()
          m = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
          if not m:
              print('ERROR: No YAML frontmatter found')
              sys.exit(1)
          yaml_block = m.group(1)
          required = ['name:', 'description:', 'user-invocable:']
          for key in required:
              if key not in yaml_block:
                  print(f'ERROR: Missing required key: {key}')
                  sys.exit(1)
          if 'clawdoc' not in yaml_block:
              print('ERROR: name field missing clawdoc')
              sys.exit(1)
          print('SKILL.md frontmatter OK')
          "

  validate-fixtures:
    name: Validate JSONL fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y jq

      - name: Validate all valid fixtures parse with jq
        run: |
          FAIL=0
          for f in tests/fixtures/*.jsonl; do
            name=$(basename "$f")
            # Skip the intentionally malformed fixture
            if [ "$name" = "15-malformed.jsonl" ]; then
              echo "SKIP (intentionally malformed): $f"
              continue
            fi
            if jq empty "$f" 2>/dev/null; then
              echo "OK: $f"
            else
              echo "FAIL: $f"
              FAIL=$((FAIL + 1))
            fi
          done
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Verify fixture count
        run: |
          count=$(ls tests/fixtures/*.jsonl | wc -l)
          echo "Fixture count: $count"
          [ "$count" -ge 38 ] || { echo "Expected at least 38 fixtures, got $count"; exit 1; }
